<section class="action-surface-container">
  <header class="action-surface-container__header">
    <h3
      *ngIf="title"
      class="action-surface-container__title orc-ui-font-body-large"
    >
      {{ title }}
    </h3>
    <p
      class="action-surface-container__subtitle orc-font-body-small"
      *ngIf="subtitle"
    >
      {{ subtitle }}
    </p>
  </header>

  <div class="action-surface-container__content">
    <ng-content></ng-content>
  </div>
</section>
