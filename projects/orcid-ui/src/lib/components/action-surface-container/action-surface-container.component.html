<section class="action-surface-container">
  <header class="action-surface-container__header">
    @if (title) {
    <h3 class="action-surface-container__title orc-ui-font-body-large">
      {{ title }}
    </h3>
    } @if (subtitle) {
    <p class="action-surface-container__subtitle orc-font-body-small">
      {{ subtitle }}
    </p>
    }
  </header>

  <div class="action-surface-container__content">
    <ng-content></ng-content>
  </div>
</section>
