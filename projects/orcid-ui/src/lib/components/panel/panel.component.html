<div class="orcid-panel" [class.orcid-panel--preferred]="isPreferred">
  <div class="orcid-panel__header">
    <div class="orcid-panel__header-main">
      @if (enableStartToggl) {
      <div
        [matTooltip]="startToggleTooltip"
        [matTooltipClass]="'no-left-align-tooltip'"
        class="featured-affiliation-star-wrapper"
        [class.view-only]="startToggleViewOnly"
      >
        <button
          mat-icon-button
          class="featured-affiliation-star"
          [class.view-only]="startToggleViewOnly"
          [disabled]="startToggleDisabled"
          [attr.aria-label]="startToggleTooltip"
          (click)="onToggleClick()"
        >
          @if (startToggleOn) {
          <mat-icon class="star-filled">star</mat-icon>
          } @if (!startToggleOn) {
          <mat-icon class="star-outline">star_outline</mat-icon>
          }
        </button>
      </div>
      } @if (showIcon) {
      <mat-icon [class]="iconClass">{{ icon }}</mat-icon>
      <div class="vl"></div>
      } @if (title) {
      <h4 class="orc-font-body" [ngClass]="{ mobile: isMobile }">
        {{ title }}
      </h4>
      }
    </div>

    <div class="orcid-panel__header-actions">
      <ng-content select="[panel-actions]"></ng-content>
      <ng-content select="[panel-edit]"></ng-content>
    </div>
  </div>

  <div class="orcid-panel__body" [id]="panelId + '-body'">
    <ng-content></ng-content>
  </div>

  <div class="orcid-panel__footer">
    <ng-content select="[panel-footer]"></ng-content>
  </div>
</div>
